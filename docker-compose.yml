services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: altyn_market
      POSTGRES_USER: altyn_market
      POSTGRES_PASSWORD: altyn_market
    ports:
      - "5433:5432"
    volumes:
      - altyn_market_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U altyn_market -d altyn_market"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  altyn_market_postgres:
