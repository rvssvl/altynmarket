name: Deploy staging

# Staging redeploys on every push to the staging branch. When production
# infrastructure exists, a deploy-production workflow will target main the
# same way.
on:
  push:
    branches:
      - staging
  workflow_dispatch:

concurrency:
  group: staging-deployment
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    name: Verify application
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.14.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build deployable services
        run: pnpm build:api && pnpm build:backoffice && pnpm build:landing
      - name: Run API workflow tests
        run: pnpm --filter @altyn-market/server test

  deploy:
    name: Deploy staging release
    needs: verify
    runs-on: ubuntu-24.04
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.STAGING_SSH_KNOWN_HOSTS }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
      - name: Upload immutable release
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          STAGING_SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
        run: |
          release_path="/opt/altyn-market/releases/${GITHUB_SHA}"
          ssh -p "$STAGING_SSH_PORT" "$STAGING_SSH_USER@$STAGING_HOST" "mkdir -p '$release_path'"
          rsync --archive --delete \
            --exclude .git \
            --exclude .github \
            --exclude .pnpm-store \
            --exclude node_modules \
            --exclude dist \
            --exclude .env \
            --exclude '.env.*' \
            --exclude infra/secrets \
            -e "ssh -p $STAGING_SSH_PORT" \
            ./ "$STAGING_SSH_USER@$STAGING_HOST:$release_path/"
      - name: Push environment file
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          STAGING_SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          curl -sSfL -o "$RUNNER_TEMP/sops" \
            https://github.com/getsops/sops/releases/download/v3.10.2/sops-v3.10.2.linux.amd64
          echo "79b0f844237bd4b0446e4dc884dbc1765fc7dedc3968f743d5949c6f2e701739  $RUNNER_TEMP/sops" \
            | sha256sum --check --quiet
          chmod +x "$RUNNER_TEMP/sops"
          "$RUNNER_TEMP/sops" decrypt infra/secrets/staging.env > "$RUNNER_TEMP/staging.env"
          if grep -q CHANGEME "$RUNNER_TEMP/staging.env"; then
            echo "infra/secrets/staging.env still contains CHANGEME placeholders." >&2
            echo "Fill them locally with: sops infra/secrets/staging.env" >&2
            exit 1
          fi
          ssh -p "$STAGING_SSH_PORT" "$STAGING_SSH_USER@$STAGING_HOST" \
            'umask 027 && cat > /etc/altyn-market/.staging.env.tmp && mv /etc/altyn-market/.staging.env.tmp /etc/altyn-market/staging.env' \
            < "$RUNNER_TEMP/staging.env"
      - name: Activate release
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          STAGING_SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
        run: |
          ssh -p "$STAGING_SSH_PORT" "$STAGING_SSH_USER@$STAGING_HOST" \
            "chmod +x /opt/altyn-market/releases/${GITHUB_SHA}/infra/scripts/deploy-release.sh && /opt/altyn-market/releases/${GITHUB_SHA}/infra/scripts/deploy-release.sh ${GITHUB_SHA}"
